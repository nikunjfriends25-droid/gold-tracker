name: Scrape gold prices hourly

on:
  schedule:
    # GitHub silently drops a large share of scheduled runs on free tier
    # (observed: 4 of 5 hourly slots skipped). Schedule 3x per hour so that
    # even with drops, data lands roughly hourly. Runs are ~35s each and
    # Actions minutes are free on public repos.
    - cron: '9,29,49 * * * *'
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Scrape and export
        run: python scripts/scrape_and_export.py

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'data: hourly price update'
          file_pattern: 'docs/data/*.json'
