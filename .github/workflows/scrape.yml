name: Scrape gold prices hourly

on:
  schedule:
    # Hourly at :23 — top-of-hour (minute 0) is GitHub's most congested
    # cron slot and gets skipped under load; an odd minute is far more
    # reliable. Runs can still drift 5-15 min; that's normal for Actions.
    - cron: '23 * * * *'
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Scrape and export
        run: python scripts/scrape_and_export.py

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'data: hourly price update'
          file_pattern: 'docs/data/*.json'
